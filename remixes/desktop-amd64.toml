[remix]
name        = "liquorix-desktop-amd64"
version     = "latest"
flavor      = "liquorix"
arch        = "x86_64"
description = "Liquorix desktop kernel for amd64 — low-latency, MuQSS/BORE scheduler"

[build]
llvm         = false
lto          = "none"
threads      = 0
config       = "defconfig"
target       = "desktop"
output       = "deb"
localversion = "-lqx"

[patches]
sets  = []
files = []

[cross]
prefix = ""

[output]
build_dir    = "build/amd64"
download_dir = "downloads"
clean_after  = false
remove_after = false

[lkf_hook]
script = "scripts/lkf-build.sh"
env    = { DISTRO = "debian", RELEASE = "trixie", ARCH = "x86_64" }
