name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deb:
    name: "deb / ${{ matrix.distro }} ${{ matrix.release }}"
    runs-on: ubuntu-latest
    if: github.repository == 'Interested-Deving-1896/liquorix-unified-kernel'
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            release: trixie
          - distro: debian
            release: bookworm
          - distro: ubuntu
            release: noble
          - distro: ubuntu
            release: questing

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Bootstrap fetches the upstream cache AND builds Docker images.
      # The source build always runs in debian/bookworm regardless of target
      # distro, so we always need the debian images in addition to the target.
      - name: Bootstrap
        run: ./scripts/bootstrap.sh debian ${{ matrix.distro }}

      - name: Resolve upstream branch
        id: upstream
        run: |
          branch=$(git ls-remote --heads https://github.com/damentz/liquorix-package \
            | grep -oP '\d+\.\d+/master' | sort -V | tail -1)
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "Upstream branch: ${branch}"

      - name: Restore kernel source cache
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: .upstream-cache/linux-liquorix_*.orig.tar.xz
          key: kernel-src-${{ steps.upstream.outputs.branch }}

      - name: Download kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          # common_bootstrap.sh downloads the kernel source tarball from kernel.org
          # if it is not already present in the upstream cache directory.
          # Run on the host (not in Docker) so it can write to .upstream-cache.
          .upstream-cache/scripts/debian/common_bootstrap.sh

      - name: Build packages
        run: |
          make build-${{ matrix.distro }} \
            RELEASE=${{ matrix.release }} \
            ARCH=x86_64 \
            PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-${{ matrix.distro }}-${{ matrix.release }}-x86_64
          path: artifacts/debian/${{ matrix.release }}/
          retention-days: 7

  build-arch:
    name: "pkg / arch x86_64"
    runs-on: ubuntu-latest
    if: github.repository == 'Interested-Deving-1896/liquorix-unified-kernel'
    # Upstream damentz/liquorix-package does not CI-test the arch build.
    # The 6.19 Dockerfile has a makepkg BUILDENV regression and missing GPG
    # keys that are outside our control. Allow failure until upstream fixes it.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Bootstrap
        run: ./scripts/bootstrap.sh arch

      - name: Download kernel source
        run: |
          docker run --rm \
            --net=host \
            --user root \
            -v "$PWD/.upstream-cache:/liquorix-package" \
            liquorix_amd64/archlinux/latest \
            /liquorix-package/scripts/archlinux/common_bootstrap.sh

      - name: Build package
        run: make build-arch ARCH=x86_64 PROCS=2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-arch-x86_64
          path: artifacts/arch/
          retention-days: 7

  build-fedora:
    name: "rpm / fedora ${{ matrix.release }}"
    runs-on: ubuntu-latest
    if: github.repository == 'Interested-Deving-1896/liquorix-unified-kernel'
    # Upstream damentz/liquorix-package does not CI-test the fedora build.
    # The 6.19 container_build-binary.sh has a hardcoded lqx1 patch filename
    # that doesn't match the actual lqx2 patch. Allow failure until upstream fixes it.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        release: ["41", "42"]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Bootstrap
        run: ./scripts/bootstrap.sh fedora

      - name: Resolve upstream branch
        id: upstream
        run: |
          branch=$(git ls-remote --heads https://github.com/damentz/liquorix-package \
            | grep -oP '\d+\.\d+/master' | sort -V | tail -1)
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - name: Restore kernel source cache
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: .upstream-cache/linux-liquorix_*.orig.tar.xz
          key: kernel-src-${{ steps.upstream.outputs.branch }}

      - name: Download kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          # Fedora container_build-binary.sh copies the debian kernel source
          # tarball from /liquorix-package. Download it on the host first.
          .upstream-cache/scripts/debian/common_bootstrap.sh

      - name: Build RPMs
        run: |
          make build-fedora \
            FEDORA_RELEASE=${{ matrix.release }} \
            ARCH=x86_64 \
            PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-fedora-${{ matrix.release }}-x86_64
          path: artifacts/fedora/
          retention-days: 7

  validate-arch-configs:
    name: "config / ${{ matrix.arch }}"
    runs-on: ubuntu-latest
    if: github.repository == 'Interested-Deving-1896/liquorix-unified-kernel'
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, riscv64]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check config status
        run: |
          if [[ -f "configs/${{ matrix.arch }}/config" ]]; then
            echo "Config present for ${{ matrix.arch }}"
          else
            echo "No config yet for ${{ matrix.arch }} — see configs/${{ matrix.arch }}/README"
          fi

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    if: github.repository == 'Interested-Deving-1896/liquorix-unified-kernel'

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: |
          find scripts/ packaging/ -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning
