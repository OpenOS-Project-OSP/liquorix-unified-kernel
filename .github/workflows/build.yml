name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deb:
    name: "deb / ${{ matrix.distro }} ${{ matrix.release }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            release: trixie
          - distro: debian
            release: bookworm
          - distro: ubuntu
            release: noble
          - distro: ubuntu
            release: questing

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Bootstrap fetches the upstream cache AND builds Docker images.
      # Both the source-build and binary-build steps depend on this.
      - name: Bootstrap
        run: ./scripts/bootstrap.sh ${{ matrix.distro }}

      - name: Download kernel source
        run: |
          # common_bootstrap.sh downloads the kernel source tarball from kernel.org
          # if it is not already present in the upstream cache directory.
          docker run --rm \
            --net=host \
            -v "$PWD/.upstream-cache:/liquorix-package" \
            liquorix_amd64/${{ matrix.distro }}/${{ matrix.release }} \
            /liquorix-package/scripts/debian/common_bootstrap.sh

      - name: Build source package
        run: |
          mkdir -p "artifacts/debian/${{ matrix.release }}"
          docker run --rm \
            --net=host \
            --tmpfs /build:exec \
            --ulimit nofile=524288:524288 \
            -v "$PWD/.upstream-cache:/liquorix-package" \
            -v "$PWD/artifacts/debian/${{ matrix.release }}:/liquorix-package/artifacts/debian/${{ matrix.release }}" \
            liquorix_amd64/${{ matrix.distro }}/${{ matrix.release }} \
            /liquorix-package/scripts/debian/container_build-source.sh \
              "${{ matrix.distro }}" "${{ matrix.release }}" "1"

      - name: Build binary packages
        run: |
          make build-${{ matrix.distro }} \
            RELEASE=${{ matrix.release }} \
            ARCH=x86_64 \
            PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-${{ matrix.distro }}-${{ matrix.release }}-x86_64
          path: artifacts/debian/${{ matrix.release }}/
          retention-days: 7

  build-arch:
    name: "pkg / arch x86_64"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Bootstrap
        run: ./scripts/bootstrap.sh arch

      - name: Download kernel source
        run: |
          docker run --rm \
            --net=host \
            --user root \
            -v "$PWD/.upstream-cache:/liquorix-package" \
            liquorix_amd64/archlinux/latest \
            /liquorix-package/scripts/archlinux/common_bootstrap.sh

      - name: Build package
        run: make build-arch ARCH=x86_64 PROCS=2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-arch-x86_64
          path: artifacts/arch/
          retention-days: 7

  build-fedora:
    name: "rpm / fedora ${{ matrix.release }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ["41", "42"]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Bootstrap
        run: ./scripts/bootstrap.sh fedora

      - name: Build RPMs
        run: |
          make build-fedora \
            FEDORA_RELEASE=${{ matrix.release }} \
            ARCH=x86_64 \
            PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-fedora-${{ matrix.release }}-x86_64
          path: artifacts/fedora/
          retention-days: 7

  validate-arch-configs:
    name: "config / ${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, riscv64]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check config status
        run: |
          if [[ -f "configs/${{ matrix.arch }}/config" ]]; then
            echo "Config present for ${{ matrix.arch }}"
          else
            echo "No config yet for ${{ matrix.arch }} — see configs/${{ matrix.arch }}/README"
          fi

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: |
          find scripts/ packaging/ -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning
