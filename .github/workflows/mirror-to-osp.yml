name: Mirror Interested-Deving-1896 → OSP

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Mirror only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to OSP"
        required: false
        default: false
        type: boolean
      force:
        description: "Force-push even if OSP branch has diverged"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read  # Added permission to read actions
  id-token: write  # Added permission to write id-token for accessing secrets

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mirror matched repos from upstream into OSP
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}  # Ensure the correct secret is used
          UPSTREAM_OWNER: Interested-Deving-1896
          OSP_ORG: OpenOS-Project-OSP
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          FORCE: ${{ inputs.force || 'false' }}
        run: bash scripts/mirror-to-osp.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
